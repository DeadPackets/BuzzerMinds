<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerMinds — Variation 4: Flat & Bold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #141425;
    --bg-surface: #1c1c38;
    --bg-elevated: #262650;
    --border: #303060;
    --pastel-lilac: #c4a8f0;
    --pastel-peach: #f0b8a0;
    --pastel-mint: #88d8b8;
    --pastel-sky: #88c0e8;
    --pastel-blush: #f0a0b8;
    --pastel-cream: #f0e0b0;
    --text-bright: #f2f0f8;
    --text-dim: #918daa;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-bright);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Soft floating blobs (flat circles, no blur) ── */
  .blob-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
  }

  .blob-1 {
    width: 400px; height: 400px;
    background: var(--pastel-lilac);
    top: -10%; left: -10%;
    animation: blob-float 14s ease-in-out infinite;
  }

  .blob-2 {
    width: 300px; height: 300px;
    background: var(--pastel-peach);
    top: 50%; right: -8%;
    animation: blob-float 11s ease-in-out infinite reverse;
  }

  .blob-3 {
    width: 250px; height: 250px;
    background: var(--pastel-mint);
    bottom: -5%; left: 20%;
    animation: blob-float 16s ease-in-out infinite;
  }

  @keyframes blob-float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -20px) scale(1.05); }
    66% { transform: translate(-10px, 15px) scale(0.95); }
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2.5rem;
  }

  /* ── Hero ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-surface);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 0.5rem 1.25rem 0.5rem 0.5rem;
    animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .logo-circle {
    width: 36px;
    height: 36px;
    background: var(--pastel-lilac);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-circle svg { width: 18px; height: 18px; color: var(--bg-deep); }

  .logo-pill span {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--pastel-lilac);
    letter-spacing: 0.02em;
  }

  .main-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(3.5rem, 9vw, 6rem);
    line-height: 0.95;
    margin-top: 1.5rem;
    animation: bounce-in 0.6s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .main-title .w1 { color: var(--pastel-blush); }
  .main-title .w2 { color: var(--pastel-sky); }

  .desc {
    color: var(--text-dim);
    font-size: 1.05rem;
    max-width: 420px;
    line-height: 1.6;
    margin-top: 1rem;
    font-weight: 500;
    animation: fade-in 0.5s 0.2s ease both;
  }

  /* ── CTA ── */
  .cta-area {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    animation: fade-in 0.5s 0.3s ease both;
  }

  .btn-big {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    padding: 1.1rem 2rem;
    border: none;
    border-radius: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .btn-big:hover { transform: scale(1.03); }
  .btn-big:active { transform: scale(0.98); }

  .btn-create {
    background: var(--pastel-lilac);
    color: var(--bg-deep);
  }

  .or-text {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
  }

  .join-bar {
    display: flex;
    gap: 0.6rem;
    background: var(--bg-surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 0.5rem;
  }

  .join-bar input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 0.7rem 0.8rem;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text-bright);
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    outline: none;
  }

  .join-bar input::placeholder {
    color: var(--text-dim);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
    font-size: 0.9rem;
  }

  .btn-join {
    background: var(--pastel-peach);
    color: var(--bg-deep);
    border: none;
    border-radius: 12px;
    padding: 0.7rem 1.5rem;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .btn-join:hover { transform: scale(1.05); }

  /* ── Features as pill badges ── */
  .features {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
    animation: fade-in 0.5s 0.5s ease both;
  }

  .feat-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-surface);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 0.6rem 1.25rem 0.6rem 0.6rem;
    transition: transform 0.2s;
  }

  .feat-pill:hover { transform: translateY(-2px); }

  .feat-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .feat-dot svg { width: 16px; height: 16px; }

  .fd-sky { background: var(--pastel-sky); color: var(--bg-deep); }
  .fd-blush { background: var(--pastel-blush); color: var(--bg-deep); }
  .fd-mint { background: var(--pastel-mint); color: var(--bg-deep); }

  .feat-pill .feat-text {
    font-weight: 600;
    font-size: 0.85rem;
  }

  .feat-pill .feat-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* ── Bouncing dots footer ── */
  .dots-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    animation: fade-in 0.5s 0.6s ease both;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: dot-bounce 1.5s ease-in-out infinite;
  }

  .dot:nth-child(1) { background: var(--pastel-lilac); animation-delay: 0s; }
  .dot:nth-child(2) { background: var(--pastel-peach); animation-delay: 0.15s; }
  .dot:nth-child(3) { background: var(--pastel-mint); animation-delay: 0.3s; }
  .dot:nth-child(4) { background: var(--pastel-sky); animation-delay: 0.45s; }
  .dot:nth-child(5) { background: var(--pastel-blush); animation-delay: 0.6s; }

  @keyframes dot-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* ── Label ── */
  .variation-label {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: var(--pastel-cream);
    color: var(--bg-deep);
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    padding: 0.5rem 1rem;
    border-radius: 50px;
    z-index: 100;
  }

  @keyframes bounce-in {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="variation-label">4 / 4 — Flat & Bold</div>

  <div class="blob-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <div class="hero">
      <div class="logo-pill">
        <div class="logo-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <span>Live Trivia Party</span>
      </div>
      <h1 class="main-title"><span class="w1">Buzzer</span><span class="w2">Minds</span></h1>
      <p class="desc">One big screen, a room full of phones, and questions that adapt to what your group actually knows.</p>
    </div>

    <div class="cta-area">
      <button class="btn-big btn-create">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Create Game
      </button>
      <div class="or-text">or join a game</div>
      <div class="join-bar">
        <input type="text" placeholder="Enter room code" maxlength="6">
        <button class="btn-join">Join</button>
      </div>
    </div>

    <div class="features">
      <div class="feat-pill">
        <div class="feat-dot fd-sky">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </div>
        <div>
          <div class="feat-text">Screen-first</div>
          <div class="feat-sub">TV or projector runs the show</div>
        </div>
      </div>
      <div class="feat-pill">
        <div class="feat-dot fd-blush">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="feat-text">Phone to play</div>
          <div class="feat-sub">No app needed, just a room code</div>
        </div>
      </div>
      <div class="feat-pill">
        <div class="feat-dot fd-mint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a9 9 0 0 1 9 9c0 3.88-3.13 7.09-5.5 9.44L12 24l-3.5-3.56C6.13 18.09 3 14.88 3 11a9 9 0 0 1 9-9z"/></svg>
        </div>
        <div>
          <div class="feat-text">AI-powered</div>
          <div class="feat-sub">Unique questions every game</div>
        </div>
      </div>
    </div>

    <div class="dots-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
