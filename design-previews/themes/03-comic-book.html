<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerMinds — Comic Book Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Comic Neue', cursive, sans-serif;
    background: #1a1a2e;
    color: #f8fafc;
  }

  /* Halftone dot pattern */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle, #f8fafc 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  /* Speed lines */
  body::after {
    content: '';
    position: fixed; inset: -50%;
    width: 200%; height: 200%;
    background: repeating-linear-gradient(
      135deg,
      transparent 0px, transparent 40px,
      rgba(248,250,252,0.015) 40px, rgba(248,250,252,0.015) 42px
    );
    animation: speedScroll 12s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes speedScroll {
    from { transform: translate(0, 0); }
    to { transform: translate(60px, 60px); }
  }

  .theme-label {
    position: fixed; top: 16px; right: 20px;
    font-family: 'Bangers', cursive;
    font-size: 0.9rem; color: #facc15;
    background: #1a1a2e; border: 2px solid #facc15;
    padding: 4px 14px; z-index: 100;
    box-shadow: 3px 3px 0 #000;
    letter-spacing: 1px;
  }

  .lobby {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 100px; padding: 44px 80px;
    height: 100vh; align-items: center;
  }

  .left-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
  .right-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-end; }

  /* Logo */
  .logo {
    font-family: 'Bangers', cursive;
    font-size: 4.5rem; line-height: 1;
    color: #ef4444;
    -webkit-text-stroke: 2.5px #000;
    paint-order: stroke fill;
    letter-spacing: 2px;
  }
  .logo span {
    color: #3b82f6;
  }

  /* Code block */
  .code-block { position: relative; }
  .code-label {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem; color: #94a3b8;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .code-label i { width: 20px; height: 20px; }
  .code-row { display: flex; gap: 12px; }
  .code-ch {
    font-family: 'Bangers', cursive;
    font-size: 5.5rem; line-height: 1;
    width: 90px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    border: 4px solid #1a1a2e;
    box-shadow: 5px 5px 0 #000;
    color: #1a1a2e; font-weight: 700;
    animation: stampIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  .code-ch:nth-child(1) { background: #ef4444; animation-delay: 0.1s; }
  .code-ch:nth-child(2) { background: #3b82f6; animation-delay: 0.2s; }
  .code-ch:nth-child(3) { background: #facc15; animation-delay: 0.3s; }
  .code-ch:nth-child(4) { background: #facc15; animation-delay: 0.4s; }
  .code-ch:nth-child(5) { background: #ef4444; animation-delay: 0.5s; }
  .code-ch:nth-child(6) { background: #3b82f6; animation-delay: 0.6s; }

  @keyframes stampIn {
    0% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .join-url {
    margin-top: 12px; font-size: 1.1rem; color: #94a3b8;
    font-family: 'Comic Neue', cursive;
  }
  .join-url b { color: #facc15; }

  /* Starburst */
  .starburst {
    position: absolute; top: -18px; right: -60px;
    width: 80px; height: 80px;
    background: #facc15; color: #1a1a2e;
    font-family: 'Bangers', cursive; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(50% 0%,61% 28%,98% 20%,72% 44%,93% 75%,60% 58%,50% 90%,40% 58%,7% 75%,28% 44%,2% 20%,39% 28%);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s backwards;
    box-shadow: none;
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Settings */
  .settings-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .s-tag {
    background: #3b82f6; color: #f8fafc;
    padding: 8px 16px; font-size: 0.95rem;
    font-family: 'Comic Neue', cursive; font-weight: 700;
    border: 3px solid #1a1a2e;
    box-shadow: 3px 3px 0 #000;
    display: flex; align-items: center; gap: 6px;
  }
  .s-tag .dim { color: #cbd5e1; font-weight: 400; display: flex; align-items: center; gap: 4px; }
  .s-tag .dim i { width: 14px; height: 14px; }

  /* QR block */
  .qr-block { text-align: right; }
  .scan-text {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem; color: #94a3b8;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px; justify-content: flex-end;
  }
  .scan-text i { width: 18px; height: 18px; }
  .qr {
    width: 180px; height: 180px;
    background: #f8fafc; color: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bangers', cursive; font-size: 1.1rem;
    border: 4px solid #1a1a2e;
    box-shadow: 6px 6px 0 #000;
    margin-left: auto;
  }

  /* Players */
  .players-block { text-align: right; }
  .players-label {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem; color: #94a3b8;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px; justify-content: flex-end;
  }
  .players-label i { width: 20px; height: 20px; }
  .player-list { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .player {
    background: #292d4a; color: #f8fafc;
    padding: 8px 18px; font-size: 1.05rem;
    font-family: 'Comic Neue', cursive; font-weight: 700;
    border: 3px solid #1a1a2e;
    box-shadow: 3px 3px 0 #000;
    display: flex; align-items: center; gap: 8px;
    animation: slideInRight 0.4s cubic-bezier(0.34,1.56,0.64,1) backwards;
  }
  .player:nth-child(1) { animation-delay: 0.3s; transform: rotate(-1deg); }
  .player:nth-child(2) { animation-delay: 0.45s; transform: rotate(1.5deg); }
  .player:nth-child(3) { animation-delay: 0.6s; transform: rotate(-2deg); }
  .player:nth-child(4) { animation-delay: 0.75s; transform: rotate(1deg); }
  .player:nth-child(5) { animation-delay: 0.9s; transform: rotate(-1.5deg); }
  @keyframes slideInRight {
    0% { transform: translateX(80px) rotate(0deg); opacity: 0; }
    100% { opacity: 1; }
  }

  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #10b981; display: inline-block;
    border: 2px solid #1a1a2e;
  }
  .vip {
    background: #facc15; color: #1a1a2e;
    padding: 2px 8px; font-size: 0.75rem;
    font-family: 'Bangers', cursive;
    border: 2px solid #1a1a2e;
    display: inline-flex; align-items: center; gap: 3px;
    margin-left: 4px;
  }
  .vip i { width: 12px; height: 12px; }

  .status {
    font-family: 'Bangers', cursive;
    font-size: 1.15rem; color: #facc15;
    letter-spacing: 1px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }
</style>
</head>
<body>
<div class="theme-label">COMIC BOOK</div>
<div class="lobby">
  <div class="left-tower">
    <div class="logo">Buzzer<span>Minds</span></div>
    <div class="code-block">
      <div class="starburst">JOIN!</div>
      <div class="code-label"><i data-lucide="hash"></i> Room Code</div>
      <div class="code-row">
        <span class="code-ch">X</span><span class="code-ch">K</span><span class="code-ch">7</span>
        <span class="code-ch">Q</span><span class="code-ch">M</span><span class="code-ch">2</span>
      </div>
      <div class="join-url">Enter at <b>quiz.deadpackets.pw</b></div>
    </div>
    <div class="settings-row">
      <div class="s-tag"><span class="dim"><i data-lucide="book-open"></i> Topic:</span> Science</div>
      <div class="s-tag"><span class="dim"><i data-lucide="sliders-horizontal"></i> Diff:</span> Medium</div>
      <div class="s-tag"><span class="dim"><i data-lucide="list-ordered"></i> Qs:</span> 10</div>
      <div class="s-tag"><span class="dim"><i data-lucide="clock"></i> Time:</span> 30s</div>
    </div>
  </div>
  <div class="right-tower">
    <div class="qr-block">
      <div class="scan-text"><i data-lucide="scan-line"></i> Scan to<br>join instantly</div>
      <div class="qr">QR CODE</div>
    </div>
    <div class="players-block">
      <div class="players-label"><i data-lucide="users"></i> Players (5 joined)</div>
      <div class="player-list">
        <div class="player"><span class="dot"></span> SpeedDemon <span class="vip"><i data-lucide="crown"></i> VIP</span></div>
        <div class="player"><span class="dot"></span> BrainiacBee</div>
        <div class="player"><span class="dot"></span> QuizWhiz42</div>
        <div class="player"><span class="dot"></span> TriviaKing</div>
        <div class="player"><span class="dot"></span> NerdHerd99</div>
      </div>
    </div>
    <div class="status">Waiting for VIP to start...</div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
