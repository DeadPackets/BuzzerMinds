<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BuzzerMinds — Ocean Night</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c1222;--surface:#141e33;--elevated:#1c2a44;--border:#263550;--cyan:#22d3ee;--teal:#34d399;--coral:#f97066;--violet:#818cf8;--gold:#fbbf24;--text:#e2e8f0;--dim:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;overflow:hidden;position:relative}
/* Memphis floating shapes */
.memphis{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.shape{position:absolute;opacity:0.045;animation:drift 28s ease-in-out infinite alternate}
.shape.circle{border-radius:50%;background:var(--cyan);width:180px;height:180px;top:8%;left:5%}
.shape.circle2{border-radius:50%;background:var(--violet);width:120px;height:120px;top:65%;right:10%;animation-delay:-8s;animation-duration:32s}
.shape.tri{width:0;height:0;border-left:90px solid transparent;border-right:90px solid transparent;border-bottom:160px solid var(--teal);top:20%;right:18%;animation-delay:-4s}
.shape.tri2{width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:110px solid var(--gold);bottom:12%;left:22%;animation-delay:-12s;animation-duration:35s}
.shape.cross{top:50%;left:45%;animation-delay:-6s;animation-duration:30s}
.shape.cross::before,.shape.cross::after{content:'';position:absolute;background:var(--coral);opacity:1;border-radius:4px}
.shape.cross::before{width:16px;height:100px;left:42px;top:0}
.shape.cross::after{width:100px;height:16px;top:42px;left:0}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(30px,-20px) rotate(15deg)}100%{transform:translate(-20px,25px) rotate(-10deg)}}
/* Theme label */
.theme-label{position:fixed;top:16px;right:20px;font-size:.7rem;font-weight:600;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;z-index:100;letter-spacing:.5px;font-family:'Sora',sans-serif}
/* Layout */
.lobby{display:grid;grid-template-columns:1fr 1fr;gap:48px;max-width:1280px;margin:0 auto;padding:48px 56px;min-height:100vh;align-items:center;position:relative;z-index:1;animation:fadeIn .8s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.left-tower{display:flex;flex-direction:column;align-items:flex-start;gap:32px}
.right-tower{display:flex;flex-direction:column;align-items:flex-end;gap:32px}
/* Logo */
.logo{font-family:'Archivo',sans-serif;font-size:3.2rem;font-weight:900;letter-spacing:-1px}
.logo .cyn{color:var(--cyan)}
.logo .tl{color:var(--teal)}
/* Code block */
.code-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;width:100%}
.code-label{font-size:.85rem;color:var(--dim);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.code-label i{width:16px;height:16px}
.code-row{display:flex;gap:10px;margin-bottom:16px}
.code-ch{font-family:'Archivo',sans-serif;font-size:5.5rem;font-weight:900;color:#fff;background:var(--elevated);border:1px solid var(--border);border-radius:10px;width:88px;height:104px;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .2s ease}
.code-ch:hover{transform:translateY(-3px)}
.join-url{font-size:.9rem;color:var(--dim)}
.join-url b{color:var(--cyan);font-weight:700}
/* Settings */
.settings-row{display:flex;flex-wrap:wrap;gap:10px}
.s-tag{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:6px;border-left:3px solid var(--cyan);transition:transform .2s ease}
.s-tag:nth-child(2){border-left-color:var(--violet)}
.s-tag:nth-child(3){border-left-color:var(--gold)}
.s-tag:nth-child(4){border-left-color:var(--coral)}
.s-tag:hover{transform:translateY(-2px)}
.s-tag i{width:14px;height:14px}
.dim{color:var(--dim)}
/* QR block */
.qr-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center}
.scan-text{font-size:.82rem;color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:center}
.scan-text i{width:16px;height:16px}
.qr{width:180px;height:180px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:700;color:#0c1222;font-size:.9rem;margin:0 auto}
/* Players */
.players-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;min-width:320px}
.players-label{font-size:.85rem;color:var(--dim);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.players-label i{width:16px;height:16px}
.player-list{display:flex;flex-direction:column;gap:4px}
.player{padding:10px 14px;border-radius:8px;font-size:1rem;font-weight:500;display:flex;align-items:center;gap:10px;background:transparent;transition:background .2s}
.player:nth-child(odd){background:rgba(28,42,68,.5)}
.player:hover{background:var(--elevated)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.player:nth-child(1) .dot{background:var(--cyan)}
.player:nth-child(2) .dot{background:var(--teal)}
.player:nth-child(3) .dot{background:var(--violet)}
.player:nth-child(4) .dot{background:var(--gold)}
.player:nth-child(5) .dot{background:var(--coral)}
.vip{font-size:.7rem;font-weight:700;color:var(--gold);background:rgba(251,191,36,.12);padding:2px 8px;border-radius:6px;margin-left:auto;display:flex;align-items:center;gap:4px}
.vip i{width:12px;height:12px}
/* Status */
.status{font-size:.9rem;color:var(--dim);font-weight:500;text-align:right;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
</style>
</head>
<body>
<div class="memphis">
  <div class="shape circle"></div><div class="shape circle2"></div>
  <div class="shape tri"></div><div class="shape tri2"></div>
  <div class="shape cross"></div>
</div>
<div class="theme-label">Ocean Night (shadcn)</div>
<div class="lobby">
  <div class="left-tower">
    <div class="logo"><span class="cyn">Buzzer</span><span class="tl">Minds</span></div>
    <div class="code-block">
      <div class="code-label"><i data-lucide="hash"></i> Room Code</div>
      <div class="code-row">
        <span class="code-ch">X</span><span class="code-ch">K</span><span class="code-ch">7</span>
        <span class="code-ch">Q</span><span class="code-ch">M</span><span class="code-ch">2</span>
      </div>
      <div class="join-url">Enter at <b>quiz.deadpackets.pw</b></div>
    </div>
    <div class="settings-row">
      <div class="s-tag"><span class="dim"><i data-lucide="book-open"></i> Topic:</span> Science</div>
      <div class="s-tag"><span class="dim"><i data-lucide="signal"></i> Diff:</span> Medium</div>
      <div class="s-tag"><span class="dim"><i data-lucide="list-ordered"></i> Qs:</span> 10</div>
      <div class="s-tag"><span class="dim"><i data-lucide="timer"></i> Time:</span> 30s</div>
    </div>
  </div>
  <div class="right-tower">
    <div class="qr-block">
      <div class="scan-text"><i data-lucide="scan-line"></i> Scan to join instantly</div>
      <div class="qr">QR CODE</div>
    </div>
    <div class="players-block">
      <div class="players-label"><i data-lucide="users"></i> Players (5 joined)</div>
      <div class="player-list">
        <div class="player"><span class="dot"></span> SpeedDemon <span class="vip"><i data-lucide="crown"></i> VIP</span></div>
        <div class="player"><span class="dot"></span> BrainiacBee</div>
        <div class="player"><span class="dot"></span> QuizWhiz42</div>
        <div class="player"><span class="dot"></span> TriviaKing</div>
        <div class="player"><span class="dot"></span> NerdHerd99</div>
      </div>
    </div>
    <div class="status">Waiting for VIP to start...</div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
