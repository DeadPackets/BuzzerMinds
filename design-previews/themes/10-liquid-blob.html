<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerMinds — Liquid Blob</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Plus Jakarta Sans', sans-serif; color: #e4e4e7; }

  .theme-label {
    position: fixed; top: 16px; right: 20px; z-index: 100;
    font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600; color: #7c3aed;
    background: rgba(10,10,15,0.7); backdrop-filter: blur(12px); padding: 6px 14px;
    border-radius: 20px; border: 1px solid rgba(124,58,237,0.2);
  }

  #blob-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
  }

  .lobby {
    position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr;
    gap: 100px; padding: 44px 80px; height: 100vh; align-items: center;
  }

  .left-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
  .right-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-end; }

  .logo {
    font-family: 'Outfit', sans-serif; font-size: 3.4rem; font-weight: 800;
    color: #7c3aed; letter-spacing: -0.02em;
    opacity: 0; animation: flowIn 1s 0.1s ease-out forwards;
  }
  .logo span { color: #0d9488; }

  .code-block {
    background: rgba(10,10,15,0.5); backdrop-filter: blur(16px);
    border: 1px solid rgba(124,58,237,0.12); border-radius: 28px 22px 26px 18px;
    padding: 28px 34px;
    opacity: 0; animation: flowIn 1s 0.2s ease-out forwards;
  }
  .code-label {
    font-size: 0.85rem; color: #71717a; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
  }
  .code-label i { width: 14px; height: 14px; }
  .code-row { display: flex; gap: 12px; margin-bottom: 12px; }

  .code-ch {
    font-family: 'Outfit', sans-serif; font-size: 5.5rem; font-weight: 800;
    line-height: 1; letter-spacing: -0.02em;
    opacity: 0;
    animation: flowIn 0.9s ease-out forwards;
  }
  .code-ch:nth-child(1) { color: #7c3aed; animation-delay: 0.3s; }
  .code-ch:nth-child(2) { color: #0d9488; animation-delay: 0.38s; }
  .code-ch:nth-child(3) { color: #6366f1; animation-delay: 0.46s; }
  .code-ch:nth-child(4) { color: #e11d48; animation-delay: 0.54s; }
  .code-ch:nth-child(5) { color: #7c3aed; animation-delay: 0.62s; }
  .code-ch:nth-child(6) { color: #0d9488; animation-delay: 0.7s; }

  .join-url { font-size: 0.95rem; color: #71717a; font-weight: 500; }
  .join-url b { color: #e4e4e7; }

  .settings-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    opacity: 0; animation: flowIn 1s 0.4s ease-out forwards;
  }
  .s-tag {
    background: rgba(10,10,15,0.45); backdrop-filter: blur(12px);
    padding: 8px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600;
    border: 1px solid rgba(124,58,237,0.1); display: flex; align-items: center; gap: 5px;
  }
  .s-tag:nth-child(1) { background: rgba(124,58,237,0.06); }
  .s-tag:nth-child(2) { background: rgba(13,148,136,0.06); }
  .s-tag:nth-child(3) { background: rgba(99,102,241,0.06); }
  .s-tag:nth-child(4) { background: rgba(225,29,72,0.06); }
  .s-tag i { width: 14px; height: 14px; }
  .dim { color: #71717a; }

  .qr-block {
    text-align: right;
    opacity: 0; animation: flowIn 1s 0.25s ease-out forwards;
  }
  .scan-text {
    font-size: 0.9rem; color: #71717a; margin-bottom: 10px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; justify-content: flex-end;
  }
  .scan-text i { width: 15px; height: 15px; }
  .qr {
    width: 180px; height: 180px; background: #fff; border-radius: 22px 18px 24px 16px;
    display: flex; align-items: center; justify-content: center;
    color: #0a0a0f; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600;
    border: 1px solid rgba(124,58,237,0.1); margin-left: auto;
  }

  .players-block {
    background: rgba(10,10,15,0.5); backdrop-filter: blur(16px);
    border: 1px solid rgba(13,148,136,0.12); border-radius: 22px 26px 18px 24px;
    padding: 22px 26px;
    opacity: 0; animation: flowIn 1s 0.35s ease-out forwards;
  }
  .players-label {
    font-size: 0.85rem; color: #71717a; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 12px; text-align: right;
    display: flex; align-items: center; gap: 6px; justify-content: flex-end;
  }
  .players-label i { width: 14px; height: 14px; }

  .player-list { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .player {
    display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 600;
    padding: 8px 18px; border-radius: 30px;
    background: rgba(10,10,15,0.35); border: 1px solid rgba(124,58,237,0.08);
    opacity: 0; transform: translateX(30px);
  }
  .player:nth-child(1) { animation: flowSlide 0.9s 0.5s ease-out forwards; }
  .player:nth-child(2) { animation: flowSlide 0.9s 0.58s ease-out forwards; }
  .player:nth-child(3) { animation: flowSlide 0.9s 0.66s ease-out forwards; }
  .player:nth-child(4) { animation: flowSlide 0.9s 0.74s ease-out forwards; }
  .player:nth-child(5) { animation: flowSlide 0.9s 0.82s ease-out forwards; }

  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .player:nth-child(1) .dot { background: #7c3aed; }
  .player:nth-child(2) .dot { background: #0d9488; }
  .player:nth-child(3) .dot { background: #6366f1; }
  .player:nth-child(4) .dot { background: #e11d48; }
  .player:nth-child(5) .dot { background: #7c3aed; }

  .vip {
    background: rgba(124,58,237,0.15); color: #a78bfa; font-size: 0.72rem; font-weight: 700;
    padding: 2px 10px; border-radius: 12px; margin-left: 4px;
    border: 1px solid rgba(124,58,237,0.2);
    display: inline-flex; align-items: center; gap: 3px;
  }
  .vip i { width: 11px; height: 11px; }

  .status {
    font-size: 1rem; color: #71717a; font-weight: 500; text-align: right;
    display: flex; align-items: center; gap: 8px; justify-content: flex-end;
    opacity: 0; animation: flowIn 1.2s 1s ease-out forwards;
  }
  .status i { width: 16px; height: 16px; }

  /* Subtle breathing on cards */
  .code-block, .players-block {
    animation-fill-mode: forwards;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.006); }
  }
  .code-block { animation: flowIn 1s 0.2s ease-out forwards, breathe 6s 1.5s ease-in-out infinite; }
  .players-block { animation: flowIn 1s 0.35s ease-out forwards, breathe 6s 2s ease-in-out infinite; }

  @keyframes flowIn {
    0% { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes flowSlide {
    0% { opacity: 0; transform: translateX(30px); }
    100% { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="theme-label">Liquid Blob</div>
<div id="blob-canvas"></div>

<div class="lobby">
  <div class="left-tower">
    <div class="logo">Buzzer<span>Minds</span></div>
    <div class="code-block">
      <div class="code-label"><i data-lucide="hash"></i> Room Code</div>
      <div class="code-row">
        <span class="code-ch">X</span><span class="code-ch">K</span><span class="code-ch">7</span>
        <span class="code-ch">Q</span><span class="code-ch">M</span><span class="code-ch">2</span>
      </div>
      <div class="join-url">Enter at <b>quiz.deadpackets.pw</b></div>
    </div>
    <div class="settings-row">
      <div class="s-tag"><span class="dim"><i data-lucide="book-open"></i> Topic:</span> Science</div>
      <div class="s-tag"><span class="dim"><i data-lucide="gauge"></i> Diff:</span> Medium</div>
      <div class="s-tag"><span class="dim"><i data-lucide="list-ordered"></i> Qs:</span> 10</div>
      <div class="s-tag"><span class="dim"><i data-lucide="timer"></i> Time:</span> 30s</div>
    </div>
  </div>
  <div class="right-tower">
    <div class="qr-block">
      <div class="scan-text"><i data-lucide="scan-line"></i> Scan to<br>join instantly</div>
      <div class="qr">QR CODE</div>
    </div>
    <div class="players-block">
      <div class="players-label"><i data-lucide="users"></i> Players (5 joined)</div>
      <div class="player-list">
        <div class="player"><span class="dot"></span> SpeedDemon <span class="vip"><i data-lucide="crown"></i> VIP</span></div>
        <div class="player"><span class="dot"></span> BrainiacBee</div>
        <div class="player"><span class="dot"></span> QuizWhiz42</div>
        <div class="player"><span class="dot"></span> TriviaKing</div>
        <div class="player"><span class="dot"></span> NerdHerd99</div>
      </div>
    </div>
    <div class="status"><i data-lucide="loader"></i> Waiting for VIP to start...</div>
  </div>
</div>

<script>
// Three.js morphing blobs
const container = document.getElementById('blob-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const blobConfigs = [
  { color: 0x7c3aed, opacity: 0.1, pos: [-3.5, 1.5, -2], scale: 2.2, speed: 0.3 },
  { color: 0x0d9488, opacity: 0.08, pos: [3, -1, -3], scale: 2.8, speed: 0.25 },
  { color: 0xe11d48, opacity: 0.07, pos: [0, 2.5, -4], scale: 2, speed: 0.35 },
  { color: 0x6366f1, opacity: 0.09, pos: [-2, -2.5, -2.5], scale: 2.4, speed: 0.28 },
  { color: 0x7c3aed, opacity: 0.06, pos: [4, 2, -3.5], scale: 1.8, speed: 0.32 },
];

const blobs = blobConfigs.map(cfg => {
  const geo = new THREE.IcosahedronGeometry(1, 4);
  const mat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: cfg.opacity, wireframe: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...cfg.pos);
  mesh.scale.setScalar(cfg.scale);
  mesh.userData = { origPositions: geo.attributes.position.array.slice(), speed: cfg.speed, drift: Math.random() * 10 };
  scene.add(mesh);
  return mesh;
});

function animateBlobs(time) {
  const t = time * 0.001;
  blobs.forEach(blob => {
    const positions = blob.geometry.attributes.position.array;
    const orig = blob.userData.origPositions;
    const s = blob.userData.speed;
    const d = blob.userData.drift;
    for (let i = 0; i < positions.length; i += 3) {
      const ox = orig[i], oy = orig[i + 1], oz = orig[i + 2];
      positions[i]     = ox + Math.sin(t * s + oy * 2.5 + d) * 0.12 + Math.cos(t * s * 0.7 + oz * 1.8) * 0.06;
      positions[i + 1] = oy + Math.sin(t * s * 0.8 + oz * 2.2 + d) * 0.12 + Math.cos(t * s * 0.6 + ox * 1.5) * 0.08;
      positions[i + 2] = oz + Math.sin(t * s * 0.9 + ox * 2.0 + d) * 0.1;
    }
    blob.geometry.attributes.position.needsUpdate = true;
    // Slow drift
    blob.position.x += Math.sin(t * 0.15 + d) * 0.002;
    blob.position.y += Math.cos(t * 0.12 + d) * 0.002;
    blob.rotation.x = Math.sin(t * 0.1 + d) * 0.3;
    blob.rotation.y = Math.cos(t * 0.08 + d) * 0.3;
  });
}

function loop(time) {
  animateBlobs(time);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

lucide.createIcons();
</script>
</body>
</html>
