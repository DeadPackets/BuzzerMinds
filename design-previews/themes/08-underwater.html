<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerMinds — Underwater</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ocean: #0a1628; --surface: #0f2035; --teal: #14b8a6; --coral: #fb7185;
    --cyan: #22d3ee; --gold: #fbbf24; --purple: #8b5cf6;
    --text: #e0f2fe; --dim: #64748b;
  }
  body { background: var(--ocean); color: var(--text); font-family: 'Quicksand', sans-serif; min-height: 100vh; overflow: hidden; }

  /* Three.js canvas */
  #bubble-canvas { position: fixed; inset: 0; z-index: 0; }

  /* Gradient overlay for depth */
  .depth-gradient { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(15,32,53,0.3) 0%, rgba(10,22,40,0) 30%, rgba(10,22,40,0.4) 100%); }

  /* Decorative seaweed */
  .seaweed-container { position: fixed; bottom: 0; left: 0; right: 0; z-index: 0; pointer-events: none; height: 200px; }
  .seaweed { position: absolute; bottom: 0; width: 18px; border-radius: 50% 50% 0 0; transform-origin: bottom center; }
  @keyframes sway { 0%, 100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }

  /* Theme label */
  .theme-label { position: fixed; top: 16px; right: 20px; font-family: 'Comfortaa', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--ocean); background: var(--teal); padding: 5px 14px; border-radius: 20px; z-index: 100; }

  /* Lobby layout */
  .lobby { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; padding: 44px 80px; min-height: 100vh; align-items: center; }
  .left-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
  .right-tower { display: flex; flex-direction: column; gap: 28px; align-items: flex-end; }

  /* Glass panel style */
  .glass { background: rgba(10, 22, 40, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(20, 184, 166, 0.15); border-radius: 16px; }

  /* Float animation */
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes float-alt { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }

  /* Logo */
  .logo { font-family: 'Comfortaa', sans-serif; font-size: 3rem; font-weight: 700; line-height: 1.1; animation: float 4s ease-in-out infinite; }
  .logo .l1 { color: var(--coral); }
  .logo .l2 { color: var(--teal); }
  .logo-wave { margin-top: 6px; height: 6px; width: 160px; }
  .logo-wave svg { width: 100%; height: 100%; }

  /* Code block */
  .code-block { padding: 24px 32px; animation: float 5s ease-in-out infinite 0.3s; }
  .code-label { font-family: 'Comfortaa', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--dim); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
  .code-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .code-ch { font-family: 'Comfortaa', sans-serif; font-size: 5.5rem; font-weight: 700; color: var(--cyan); width: 86px; height: 100px; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(20, 184, 166, 0.4); border-radius: 14px; background: rgba(20, 184, 166, 0.06); line-height: 1; }
  .join-url { font-size: 1rem; color: var(--dim); }
  .join-url b { color: var(--teal); font-weight: 700; }

  /* Settings */
  .settings-row { display: flex; gap: 10px; flex-wrap: wrap; animation: float-alt 4.5s ease-in-out infinite 0.6s; }
  .s-tag { font-size: 0.85rem; font-weight: 600; padding: 7px 14px; border-radius: 10px; display: flex; align-items: center; gap: 5px; background: rgba(10, 22, 40, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(20, 184, 166, 0.12);
    clip-path: polygon(0% 0%, 100% 0%, 100% 75%, 95% 80%, 90% 75%, 85% 82%, 80% 75%, 75% 80%, 70% 75%, 65% 82%, 60% 75%, 55% 80%, 50% 75%, 45% 82%, 40% 75%, 35% 80%, 30% 75%, 25% 82%, 20% 75%, 15% 80%, 10% 75%, 5% 82%, 0% 75%);
    padding-bottom: 16px; }
  .s-tag .dim { color: var(--dim); }
  .s-tag:nth-child(1) { color: var(--teal); }
  .s-tag:nth-child(2) { color: var(--coral); }
  .s-tag:nth-child(3) { color: var(--cyan); }
  .s-tag:nth-child(4) { color: var(--gold); }

  /* QR block */
  .qr-block { text-align: right; animation: float 5.5s ease-in-out infinite 0.2s; }
  .scan-text { font-size: 0.9rem; color: var(--dim); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .qr { width: 180px; height: 180px; background: #fff; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Comfortaa', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--ocean); border: 2px solid rgba(20, 184, 166, 0.3); }

  /* Players */
  .players-block { text-align: right; animation: float-alt 4.8s ease-in-out infinite 0.4s; }
  .players-label { font-family: 'Comfortaa', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--dim); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .player-list { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .player { font-size: 1.05rem; font-weight: 500; display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; background: rgba(10, 22, 40, 0.45); backdrop-filter: blur(8px); border: 1px solid rgba(20, 184, 166, 0.1); }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .player:nth-child(1) .dot { background: var(--teal); }
  .player:nth-child(2) .dot { background: var(--coral); }
  .player:nth-child(3) .dot { background: var(--cyan); }
  .player:nth-child(4) .dot { background: var(--purple); }
  .player:nth-child(5) .dot { background: var(--gold); }
  .vip { font-family: 'Comfortaa', sans-serif; font-size: 0.65rem; font-weight: 700; background: var(--gold); color: var(--ocean); padding: 2px 8px; border-radius: 10px; display: inline-flex; align-items: center; gap: 3px; text-transform: uppercase; }

  /* Status */
  .status { font-family: 'Comfortaa', sans-serif; font-size: 1rem; font-weight: 600; color: var(--teal); padding: 10px 22px; border-radius: 20px; border: 1px solid rgba(20, 184, 166, 0.25); background: rgba(20, 184, 166, 0.06); animation: float 3.5s ease-in-out infinite; }

  /* Entrance animation */
  @keyframes rise-in { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
  .left-tower > *, .right-tower > * { animation: rise-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards, float 5s ease-in-out infinite; }
  .left-tower > *:nth-child(1) { animation-delay: 0.1s, 0.8s; }
  .left-tower > *:nth-child(2) { animation-delay: 0.25s, 1s; }
  .left-tower > *:nth-child(3) { animation-delay: 0.4s, 1.2s; }
  .right-tower > *:nth-child(1) { animation-delay: 0.15s, 0.9s; }
  .right-tower > *:nth-child(2) { animation-delay: 0.3s, 1.1s; }
  .right-tower > *:nth-child(3) { animation-delay: 0.45s, 1.3s; }

  /* Small decorative fish */
  .fish { position: fixed; z-index: 0; pointer-events: none; font-size: 1.2rem; opacity: 0.15; }
  @keyframes swim-left { 0% { transform: translateX(100vw) translateY(0); } 50% { transform: translateX(50vw) translateY(-15px); } 100% { transform: translateX(-60px) translateY(5px); } }
  @keyframes swim-right { 0% { transform: translateX(-60px) scaleX(-1) translateY(0); } 50% { transform: translateX(50vw) scaleX(-1) translateY(10px); } 100% { transform: translateX(100vw) scaleX(-1) translateY(-5px); } }

  .code-label i, .scan-text i, .players-label i, .s-tag i { width: 16px; height: 16px; }
  .vip i { width: 12px; height: 12px; }
</style>
</head>
<body>

<div class="theme-label">Underwater</div>
<canvas id="bubble-canvas"></canvas>
<div class="depth-gradient"></div>

<!-- Seaweed -->
<div class="seaweed-container" id="seaweed-container"></div>

<div class="lobby">
  <div class="left-tower">
    <div>
      <div class="logo"><span class="l1">Buzzer</span><span class="l2">Minds</span></div>
      <div class="logo-wave">
        <svg viewBox="0 0 160 8" fill="none"><path d="M0 4 Q10 0 20 4 Q30 8 40 4 Q50 0 60 4 Q70 8 80 4 Q90 0 100 4 Q110 8 120 4 Q130 0 140 4 Q150 8 160 4" stroke="#14b8a6" stroke-width="2" fill="none"/></svg>
      </div>
    </div>
    <div class="code-block glass">
      <div class="code-label"><i data-lucide="hash"></i> Room Code</div>
      <div class="code-row">
        <span class="code-ch">X</span><span class="code-ch">K</span><span class="code-ch">7</span>
        <span class="code-ch">Q</span><span class="code-ch">M</span><span class="code-ch">2</span>
      </div>
      <div class="join-url">Enter at <b>quiz.deadpackets.pw</b></div>
    </div>
    <div class="settings-row">
      <div class="s-tag"><span class="dim"><i data-lucide="book-open"></i> Topic:</span> Science</div>
      <div class="s-tag"><span class="dim"><i data-lucide="gauge"></i> Diff:</span> Medium</div>
      <div class="s-tag"><span class="dim"><i data-lucide="list-ordered"></i> Qs:</span> 10</div>
      <div class="s-tag"><span class="dim"><i data-lucide="clock"></i> Time:</span> 30s</div>
    </div>
  </div>
  <div class="right-tower">
    <div class="qr-block">
      <div class="scan-text"><i data-lucide="scan-line"></i> Scan to join</div>
      <div class="qr">QR CODE</div>
    </div>
    <div class="players-block">
      <div class="players-label"><i data-lucide="waves"></i> Players (5 joined)</div>
      <div class="player-list">
        <div class="player"><span class="dot"></span> SpeedDemon <span class="vip"><i data-lucide="crown"></i> VIP</span></div>
        <div class="player"><span class="dot"></span> BrainiacBee</div>
        <div class="player"><span class="dot"></span> QuizWhiz42</div>
        <div class="player"><span class="dot"></span> TriviaKing</div>
        <div class="player"><span class="dot"></span> NerdHerd99</div>
      </div>
    </div>
    <div class="status">Waiting for VIP to start...</div>
  </div>
</div>

<script>
// Three.js bubbles
(function() {
  const canvas = document.getElementById('bubble-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 30;

  const bubbles = [];
  const bubbleGeo = new THREE.SphereGeometry(1, 16, 16);
  const colors = [0x14b8a6, 0x22d3ee, 0x8b5cf6, 0xfb7185];

  for (let i = 0; i < 40; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: colors[i % colors.length],
      transparent: true,
      opacity: 0.08 + Math.random() * 0.07,
    });
    const mesh = new THREE.Mesh(bubbleGeo, mat);
    const scale = 0.15 + Math.random() * 0.5;
    mesh.scale.set(scale, scale, scale);
    mesh.position.set(
      (Math.random() - 0.5) * 50,
      (Math.random() - 0.5) * 40 - 20,
      (Math.random() - 0.5) * 10
    );
    mesh.userData = {
      speed: 0.008 + Math.random() * 0.015,
      wobbleSpeed: 0.5 + Math.random() * 1.5,
      wobbleAmp: 0.02 + Math.random() * 0.04,
      startX: mesh.position.x,
      phase: Math.random() * Math.PI * 2,
    };
    scene.add(mesh);
    bubbles.push(mesh);
  }

  function animate(t) {
    requestAnimationFrame(animate);
    const time = t * 0.001;
    for (const b of bubbles) {
      b.position.y += b.userData.speed;
      b.position.x = b.userData.startX + Math.sin(time * b.userData.wobbleSpeed + b.userData.phase) * b.userData.wobbleAmp * 30;
      if (b.position.y > 25) {
        b.position.y = -25;
        b.userData.startX = (Math.random() - 0.5) * 50;
      }
    }
    renderer.render(scene, camera);
  }
  animate(0);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// Generate seaweed
(function() {
  const container = document.getElementById('seaweed-container');
  const seaweedColors = ['rgba(20,184,166,0.12)', 'rgba(34,211,238,0.08)', 'rgba(139,92,246,0.07)'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'seaweed';
    const h = 60 + Math.random() * 120;
    el.style.cssText = `
      left: ${5 + (i / 12) * 90}%;
      height: ${h}px;
      background: ${seaweedColors[i % 3]};
      border-radius: 50% 50% 0 0;
      animation: sway ${3 + Math.random() * 3}s ease-in-out infinite;
      animation-delay: ${Math.random() * 2}s;
    `;
    container.appendChild(el);
  }
})();

lucide.createIcons();
</script>
</body>
</html>
