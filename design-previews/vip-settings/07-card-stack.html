<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VIP Settings — 07 Card Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #141414; --surface: rgba(30,30,30,0.65);
    --amber: #f59e0b; --sage: #4ade80; --rose: #fb7185;
    --sky: #38bdf8; --cream: #fef3c7;
    --text-bright: #f5f5f5; --text-dim: #737373;
    --border: rgba(255,255,255,0.06);
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'Outfit', sans-serif;
  }
  html, body {
    min-height: 100%; background: var(--bg); color: var(--text-bright);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  /* ── Theme label ── */
  .theme-label {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    background: rgba(30,30,30,0.7); backdrop-filter: blur(8px);
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(245,158,11,0.12);
  }

  /* ── Background ── */
  #three-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── Page layout ── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }

  .cards-container {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column; gap: 12px;
    padding-top: 8px;
  }

  /* ── Card base ── */
  .setting-card {
    background: var(--surface);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-left: 3px solid var(--card-accent, var(--amber));
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    animation: cardSlideUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .setting-card:nth-child(1) { --card-accent: var(--amber); animation-delay: 0.06s; }
  .setting-card:nth-child(2) { --card-accent: var(--sage);  animation-delay: 0.13s; }
  .setting-card:nth-child(3) { --card-accent: var(--sky);   animation-delay: 0.20s; }
  .setting-card:nth-child(4) { --card-accent: var(--rose);  animation-delay: 0.27s; }
  .setting-card:nth-child(5) { --card-accent: var(--cream); animation-delay: 0.34s; }

  @keyframes cardSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Card header ── */
  .card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 0;
  }
  .card-head-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--card-accent) 12%, transparent);
    flex-shrink: 0;
  }
  .card-head-icon i {
    width: 14px; height: 14px; color: var(--card-accent);
  }
  .card-head-title {
    font-family: var(--font-display); font-weight: 700; font-size: 0.82rem;
    letter-spacing: 0.01em; color: var(--text-bright);
  }

  /* ── Card body ── */
  .card-body {
    padding: 10px 14px 14px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── Field row helpers ── */
  .field-row {
    display: flex; flex-direction: column; gap: 5px;
  }
  .field-row-inline {
    display: flex; gap: 10px;
  }
  .field-row-inline > .field-row { flex: 1; min-width: 0; }
  .field-label {
    font-size: 0.65rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 4px;
  }
  .field-label i { width: 11px; height: 11px; color: var(--card-accent); }

  /* ── Segmented pill control (AI Model) ── */
  .segmented-pills {
    display: flex; gap: 0;
    background: rgba(20,20,20,0.6);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    overflow: hidden;
  }
  .seg-pill {
    flex: 1; padding: 9px 6px;
    border: none; background: none; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.74rem; font-weight: 500;
    color: var(--text-dim); cursor: pointer;
    transition: all 0.2s ease;
    text-align: center; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    user-select: none; position: relative;
  }
  .seg-pill:hover { color: var(--text-bright); }
  .seg-pill.active {
    background: color-mix(in srgb, var(--card-accent) 18%, transparent);
    color: var(--card-accent);
    font-weight: 600;
  }

  /* ── Number stepper ── */
  .stepper {
    display: flex; align-items: center; gap: 0;
    background: rgba(20,20,20,0.6);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .stepper-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--text-dim);
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    flex-shrink: 0;
  }
  .stepper-btn:hover { color: var(--text-bright); background: rgba(255,255,255,0.04); }
  .stepper-btn:active { background: rgba(255,255,255,0.08); transform: scale(0.92); }
  .stepper-val {
    flex: 1; text-align: center;
    font-family: var(--font-display); font-weight: 700; font-size: 0.88rem;
    color: var(--card-accent);
    min-width: 28px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0 2px;
  }

  /* ── Inline pill toggle (reveal/end mode, moderation) ── */
  .pill-toggle {
    display: flex; gap: 5px;
  }
  .pill-opt {
    flex: 1; padding: 8px 6px;
    background: rgba(20,20,20,0.5);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body); font-size: 0.72rem; font-weight: 500;
    color: var(--text-dim); text-align: center;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .pill-opt:hover { border-color: rgba(255,255,255,0.12); color: var(--text-bright); }
  .pill-opt.active {
    background: color-mix(in srgb, var(--card-accent) 14%, transparent);
    border-color: color-mix(in srgb, var(--card-accent) 35%, transparent);
    color: var(--card-accent);
    font-weight: 600;
  }

  /* ── Compact range slider with value badge ── */
  .compact-slider {
    display: flex; align-items: center; gap: 8px;
  }
  .compact-slider input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.08);
    outline: none; cursor: pointer;
    --fill: 50%;
    background: linear-gradient(to right,
      color-mix(in srgb, var(--card-accent) 40%, transparent) 0%,
      color-mix(in srgb, var(--card-accent) 40%, transparent) var(--fill),
      rgba(255,255,255,0.08) var(--fill),
      rgba(255,255,255,0.08) 100%
    );
  }
  .compact-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--card-accent); border: 2.5px solid #1e1e1e;
    cursor: pointer; transition: transform 0.12s;
  }
  .compact-slider input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .compact-slider input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--card-accent); border: 2.5px solid #1e1e1e;
    cursor: pointer;
  }
  .compact-slider input[type="range"]::-webkit-slider-runnable-track {
    height: 5px; border-radius: 3px;
  }
  .compact-slider input[type="range"]::-moz-range-track {
    height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.08);
  }
  .slider-badge {
    min-width: 32px; text-align: center;
    font-family: var(--font-display); font-weight: 700; font-size: 0.72rem;
    color: var(--card-accent);
    background: color-mix(in srgb, var(--card-accent) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--card-accent) 18%, transparent);
    border-radius: 6px; padding: 3px 6px;
    white-space: nowrap;
  }

  /* ── Audio toggles row ── */
  .audio-row {
    display: flex; gap: 8px;
  }
  .audio-toggle {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding: 10px 6px;
    background: rgba(20,20,20,0.5);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .audio-toggle:hover { border-color: rgba(255,255,255,0.1); }
  .audio-toggle.active {
    background: color-mix(in srgb, var(--cream) 6%, transparent);
    border-color: color-mix(in srgb, var(--cream) 18%, transparent);
  }
  .audio-toggle i {
    width: 18px; height: 18px; color: var(--text-dim);
    transition: color 0.2s;
  }
  .audio-toggle.active i { color: var(--cream); }
  .audio-toggle-label {
    font-size: 0.6rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .audio-toggle.active .audio-toggle-label { color: var(--text-bright); }
  .mini-switch {
    width: 32px; height: 18px; border-radius: 9px;
    background: rgba(255,255,255,0.1);
    position: relative; transition: background 0.25s;
  }
  .mini-switch::after {
    content: '';
    position: absolute; top: 2.5px; left: 2.5px;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.25s, background 0.25s;
  }
  .audio-toggle.active .mini-switch {
    background: color-mix(in srgb, var(--cream) 30%, transparent);
  }
  .audio-toggle.active .mini-switch::after {
    transform: translateX(14px);
    background: var(--cream);
  }

  /* ── Conditional visibility ── */
  .cond-hidden {
    display: none !important;
  }
  .cond-field {
    transition: opacity 0.25s ease, max-height 0.3s ease;
    overflow: hidden;
  }

  /* ── Start button area ── */
  .start-area {
    width: 100%; max-width: 440px;
    margin-top: 8px;
    opacity: 0; transform: translateY(16px);
    animation: cardSlideUp 0.45s 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .start-btn {
    width: 100%; padding: 14px;
    background: var(--amber); color: var(--bg); border: none; border-radius: 14px;
    font-family: var(--font-display); font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: filter 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .start-btn:hover { filter: brightness(1.08); }
  .start-btn:active { filter: brightness(0.95); transform: scale(0.98); }
  .start-btn i { width: 17px; height: 17px; }
  .start-btn:disabled {
    opacity: 0.5; cursor: not-allowed; filter: saturate(0.5);
  }

  .blockers {
    margin-top: 8px; display: flex; flex-direction: column; gap: 4px;
    align-items: center;
  }
  .blocker-item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.66rem; color: var(--rose); font-weight: 500;
  }
  .blocker-item i { width: 12px; height: 12px; }

  /* ── Small-screen tightening ── */
  @media (max-width: 380px) {
    .page { padding: 12px; }
    .cards-container { gap: 10px; }
    .card-head { padding: 10px 12px 0; }
    .card-body { padding: 8px 12px 12px; }
    .seg-pill { font-size: 0.68rem; padding: 8px 4px; }
    .stepper-btn { width: 32px; height: 32px; font-size: 1rem; }
    .stepper-val { font-size: 0.8rem; }
    .pill-opt { font-size: 0.66rem; padding: 7px 4px; }
    .slider-badge { font-size: 0.66rem; padding: 2px 5px; min-width: 28px; }
    .audio-toggle { padding: 8px 4px; gap: 5px; }
    .audio-toggle i { width: 16px; height: 16px; }
    .audio-toggle-label { font-size: 0.55rem; }
    .mini-switch { width: 28px; height: 16px; }
    .mini-switch::after { width: 11px; height: 11px; top: 2.5px; left: 2.5px; }
    .audio-toggle.active .mini-switch::after { transform: translateX(12px); }
    .start-btn { padding: 13px; font-size: 0.92rem; }
  }

  /* ── Tall-screen ── */
  @media (min-height: 750px) {
    .cards-container { gap: 14px; padding-top: 12px; }
    .card-body { padding: 12px 16px 16px; gap: 12px; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="theme-label">07 — Card Stack</div>

<canvas id="three-canvas"></canvas>

<div class="page">
  <div class="cards-container">

    <!-- ═══════════════════════════════════════════════ -->
    <!-- CARD 1: AI Model (amber)                       -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="setting-card">
      <div class="card-head">
        <div class="card-head-icon"><i data-lucide="cpu"></i></div>
        <div class="card-head-title">AI Model</div>
      </div>
      <div class="card-body">
        <div class="field-row">
          <div class="field-label"><i data-lucide="sparkles"></i> Preset</div>
          <div class="segmented-pills" data-seg-group="model">
            <button class="seg-pill active" data-value="balanced">Balanced</button>
            <button class="seg-pill" data-value="creative">Creative</button>
            <button class="seg-pill" data-value="precise">Precise</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- CARD 2: Game Rules (sage)                      -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="setting-card">
      <div class="card-head">
        <div class="card-head-icon"><i data-lucide="trophy"></i></div>
        <div class="card-head-title">Game Rules</div>
      </div>
      <div class="card-body">
        <!-- Topic pool + Rounds side by side as steppers -->
        <div class="field-row-inline">
          <div class="field-row">
            <div class="field-label"><i data-lucide="library"></i> Topics</div>
            <div class="stepper" data-stepper="topics" data-min="3" data-max="12" data-value="6">
              <button class="stepper-btn" data-dir="-1">&minus;</button>
              <div class="stepper-val">6</div>
              <button class="stepper-btn" data-dir="1">&plus;</button>
            </div>
          </div>
          <div class="field-row">
            <div class="field-label"><i data-lucide="repeat"></i> Rounds</div>
            <div class="stepper" data-stepper="rounds" data-min="1" data-max="20" data-value="5">
              <button class="stepper-btn" data-dir="-1">&minus;</button>
              <div class="stepper-val">5</div>
              <button class="stepper-btn" data-dir="1">&plus;</button>
            </div>
          </div>
        </div>

        <!-- Reveal mode -->
        <div class="field-row">
          <div class="field-label"><i data-lucide="eye"></i> Reveal</div>
          <div class="pill-toggle" data-pill-group="reveal">
            <div class="pill-opt active" data-value="progressive">Progressive</div>
            <div class="pill-opt" data-value="full">Full</div>
          </div>
        </div>

        <!-- End mode -->
        <div class="field-row">
          <div class="field-label"><i data-lucide="flag"></i> Ends By</div>
          <div class="pill-toggle" data-pill-group="end-mode">
            <div class="pill-opt active" data-value="rounds">Rounds</div>
            <div class="pill-opt" data-value="timer">Timer</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- CARD 3: Timing (sky)                           -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="setting-card">
      <div class="card-head">
        <div class="card-head-icon"><i data-lucide="timer"></i></div>
        <div class="card-head-title">Timing</div>
      </div>
      <div class="card-body">
        <!-- Answer time -->
        <div class="field-row">
          <div class="field-label"><i data-lucide="message-circle"></i> Answer</div>
          <div class="compact-slider">
            <input type="range" id="answer-time" min="10" max="60" value="30" data-display="answer-time-val" data-suffix="s">
            <div class="slider-badge" id="answer-time-val">30s</div>
          </div>
        </div>

        <!-- No-buzz -->
        <div class="field-row">
          <div class="field-label"><i data-lucide="shield-off"></i> No-Buzz</div>
          <div class="compact-slider">
            <input type="range" id="no-buzz" min="0" max="10" value="3" data-display="no-buzz-val" data-suffix="s">
            <div class="slider-badge" id="no-buzz-val">3s</div>
          </div>
        </div>

        <!-- Bonus time -->
        <div class="field-row">
          <div class="field-label"><i data-lucide="zap"></i> Bonus</div>
          <div class="compact-slider">
            <input type="range" id="bonus-time" min="5" max="30" value="15" data-display="bonus-time-val" data-suffix="s">
            <div class="slider-badge" id="bonus-time-val">15s</div>
          </div>
        </div>

        <!-- Timer minutes (conditional: visible only when end-mode=timer) -->
        <div class="field-row cond-field cond-hidden" id="timer-minutes-field">
          <div class="field-label"><i data-lucide="clock"></i> Game Timer</div>
          <div class="compact-slider">
            <input type="range" id="timer-minutes" min="5" max="60" value="15" data-display="timer-minutes-val" data-suffix="m">
            <div class="slider-badge" id="timer-minutes-val">15m</div>
          </div>
        </div>

        <!-- Timer expiry (conditional) -->
        <div class="field-row cond-field cond-hidden" id="timer-expiry-field">
          <div class="field-label"><i data-lucide="alarm-clock-off"></i> On Expiry</div>
          <div class="pill-toggle" data-pill-group="timer-expiry">
            <div class="pill-opt active" data-value="finish_round">Finish Round</div>
            <div class="pill-opt" data-value="finish_main_only">Main Only</div>
            <div class="pill-opt" data-value="stop_immediately">Stop</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- CARD 4: Content (rose)                         -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="setting-card">
      <div class="card-head">
        <div class="card-head-icon"><i data-lucide="shield-check"></i></div>
        <div class="card-head-title">Content</div>
      </div>
      <div class="card-body">
        <div class="field-row">
          <div class="field-label"><i data-lucide="filter"></i> Moderation</div>
          <div class="pill-toggle" data-pill-group="moderation">
            <div class="pill-opt" data-value="off">Off</div>
            <div class="pill-opt active" data-value="light">Light</div>
            <div class="pill-opt" data-value="family_safe">Family</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- CARD 5: Audio (cream)                          -->
    <!-- ═══════════════════════════════════════════════ -->
    <div class="setting-card">
      <div class="card-head">
        <div class="card-head-icon"><i data-lucide="volume-2"></i></div>
        <div class="card-head-title">Audio</div>
      </div>
      <div class="card-body">
        <div class="audio-row">
          <div class="audio-toggle active" data-toggle="narration">
            <i data-lucide="mic"></i>
            <span class="audio-toggle-label">Narration</span>
            <div class="mini-switch"></div>
          </div>
          <div class="audio-toggle active" data-toggle="sfx">
            <i data-lucide="bell-ring"></i>
            <span class="audio-toggle-label">SFX</span>
            <div class="mini-switch"></div>
          </div>
          <div class="audio-toggle active" data-toggle="music">
            <i data-lucide="music"></i>
            <span class="audio-toggle-label">Music</span>
            <div class="mini-switch"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /cards-container -->

  <!-- ── Start area ── -->
  <div class="start-area">
    <button class="start-btn" id="start-btn">
      <i data-lucide="play"></i> Start Match
    </button>
    <div class="blockers" id="blockers">
      <div class="blocker-item">
        <i data-lucide="alert-circle"></i>
        Need at least 2 players to start
      </div>
    </div>
  </div>

</div><!-- /page -->

<script>
  // ── Lucide icons ──
  lucide.createIcons();

  // ── Segmented pill controls ──
  document.querySelectorAll('.segmented-pills').forEach(group => {
    const pills = group.querySelectorAll('.seg-pill');
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  });

  // ── Number steppers ──
  document.querySelectorAll('.stepper').forEach(stepper => {
    const min = parseInt(stepper.dataset.min);
    const max = parseInt(stepper.dataset.max);
    let value = parseInt(stepper.dataset.value);
    const valEl = stepper.querySelector('.stepper-val');
    const btns = stepper.querySelectorAll('.stepper-btn');

    function update() {
      valEl.textContent = value;
      btns[0].style.opacity = value <= min ? '0.3' : '1';
      btns[1].style.opacity = value >= max ? '0.3' : '1';
    }

    btns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const dir = parseInt(btn.dataset.dir);
        const next = value + dir;
        if (next >= min && next <= max) {
          value = next;
          stepper.dataset.value = value;
          update();
          // small tactile pulse on the value
          valEl.style.transform = 'scale(1.15)';
          setTimeout(() => { valEl.style.transform = ''; }, 120);
        }
      });
    });

    update();
  });

  // ── Pill toggles ──
  document.querySelectorAll('.pill-toggle').forEach(group => {
    const pills = group.querySelectorAll('.pill-opt');
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');

        // Show/hide timer-related fields based on end mode
        if (group.dataset.pillGroup === 'end-mode') {
          const isTimer = pill.dataset.value === 'timer';
          const tf = document.getElementById('timer-minutes-field');
          const ef = document.getElementById('timer-expiry-field');
          if (tf) tf.classList.toggle('cond-hidden', !isTimer);
          if (ef) ef.classList.toggle('cond-hidden', !isTimer);
        }
      });
    });
  });

  // ── Range sliders ──
  document.querySelectorAll('.compact-slider input[type="range"]').forEach(slider => {
    const displayId = slider.dataset.display;
    const display = document.getElementById(displayId);
    const suffix = slider.dataset.suffix || '';

    function updateSlider() {
      if (display) display.textContent = slider.value + suffix;
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      const val = parseFloat(slider.value);
      const pct = ((val - min) / (max - min)) * 100;
      slider.style.setProperty('--fill', pct + '%');
    }

    slider.addEventListener('input', updateSlider);
    updateSlider();
  });

  // ── Audio toggles ──
  document.querySelectorAll('.audio-toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('active');
    });
  });

  // ── Start button ──
  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    startBtn.addEventListener('click', () => {
      startBtn.style.transform = 'scale(0.96)';
      setTimeout(() => { startBtn.style.transform = ''; }, 150);
    });
  }

  // ── Three.js wireframe background ──
  (function initThree() {
    const canvas = document.getElementById('three-canvas');
    if (!canvas || typeof THREE === 'undefined') return;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 20;

    const palette = [
      new THREE.Color('#f59e0b'),
      new THREE.Color('#4ade80'),
      new THREE.Color('#fb7185'),
      new THREE.Color('#38bdf8'),
    ];

    const shapes = [];
    const count = window.innerWidth < 500 ? 7 : 12;

    for (let i = 0; i < count; i++) {
      const size = 0.5 + Math.random() * 1.6;
      const geoType = Math.random();
      let geometry;
      if (geoType < 0.4) {
        geometry = new THREE.OctahedronGeometry(size, 0);
      } else if (geoType < 0.7) {
        geometry = new THREE.TetrahedronGeometry(size, 0);
      } else {
        geometry = new THREE.IcosahedronGeometry(size, 0);
      }
      const wireframe = new THREE.WireframeGeometry(geometry);
      const color = palette[i % palette.length];
      const opacity = 0.07 + Math.random() * 0.05;
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      const mesh = new THREE.LineSegments(wireframe, material);

      mesh.position.set(
        (Math.random() - 0.5) * 32,
        (Math.random() - 0.5) * 22,
        (Math.random() - 0.5) * 14
      );

      const rotSpeed = {
        x: (Math.random() - 0.5) * 0.003,
        y: (Math.random() - 0.5) * 0.005,
        z: (Math.random() - 0.5) * 0.002,
      };
      const driftSpeed = {
        x: (Math.random() - 0.5) * 0.002,
        y: (Math.random() - 0.5) * 0.0015,
      };

      shapes.push({ mesh, rotSpeed, driftSpeed });
      scene.add(mesh);
    }

    function animate() {
      requestAnimationFrame(animate);
      shapes.forEach(s => {
        s.mesh.rotation.x += s.rotSpeed.x;
        s.mesh.rotation.y += s.rotSpeed.y;
        s.mesh.rotation.z += s.rotSpeed.z;
        s.mesh.position.x += s.driftSpeed.x;
        s.mesh.position.y += s.driftSpeed.y;
        if (s.mesh.position.x > 20) s.mesh.position.x = -20;
        if (s.mesh.position.x < -20) s.mesh.position.x = 20;
        if (s.mesh.position.y > 14) s.mesh.position.y = -14;
        if (s.mesh.position.y < -14) s.mesh.position.y = 14;
      });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
</script>
</body>
</html>
