<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout D: Scattered Atoms</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --text: #e8e6f0; --text-dim: #6b6e7b;
    --accent: #7c6ef6; --green: #34d399; --gold: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .bg-dot { position: absolute; border-radius: 50%; opacity: 0.04; }
  .layout-label {
    position: fixed; top: 16px; right: 16px; z-index: 99;
    padding: 6px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 700; color: var(--text-dim);
    background: rgba(26,29,39,0.7); backdrop-filter: blur(8px);
  }

  /* ══════════════════════════════════════════
     LAYOUT D: SCATTERED ATOMS
     Every single element is its own floating "atom."
     Individual code characters are separate atoms.
     Individual player names are separate atoms.
     Individual settings are separate atoms.
     Nothing is grouped — maximum background exposure.
     Slight random rotations for organic feel.
     ══════════════════════════════════════════ */

  .lobby {
    position: relative; z-index: 1;
    height: 100vh; padding: 40px 60px;
  }

  .atom {
    background: rgba(26,29,39,0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Logo — top center */
  .logo {
    position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    font-size: 2.2rem; font-weight: 900;
  }
  .logo span { color: var(--accent); }

  /* Code label */
  .code-label {
    position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
    font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--text-dim);
  }

  /* Individual code characters — spread across center */
  .code-ch {
    position: absolute; top: 50%; transform: translateY(-70%);
    font-size: 7rem; font-weight: 900; line-height: 1;
    color: var(--accent);
  }
  .ch-1 { left: 10%; transform: translateY(-70%) rotate(-1.5deg); }
  .ch-2 { left: 23%; transform: translateY(-70%) rotate(0.5deg); }
  .ch-3 { left: 36%; transform: translateY(-70%) rotate(-0.8deg); }
  .ch-4 { left: 52%; transform: translateY(-70%) rotate(1.2deg); }
  .ch-5 { left: 65%; transform: translateY(-70%) rotate(-0.5deg); }
  .ch-6 { left: 78%; transform: translateY(-70%) rotate(1deg); }

  /* Join URL — below code center */
  .join-url {
    position: absolute; top: 58%; left: 50%; transform: translateX(-50%);
    font-size: 1.2rem; font-weight: 600; color: var(--text-dim);
    white-space: nowrap;
  }
  .join-url b { color: var(--accent); }

  /* QR — right side, vertically centered */
  .qr-area {
    position: absolute; top: 150px; right: 60px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .qr {
    width: 170px; height: 170px;
    background: white; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #333;
  }
  .scan-text { font-size: 0.95rem; font-weight: 600; color: var(--text-dim); text-align: center; }

  /* Players — scattered as individual floating pills across bottom area */
  .players-area {
    position: absolute; bottom: 100px; left: 60px; right: 60px;
  }
  .players-label {
    font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 12px;
    text-align: center;
  }
  .player-scatter {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  }
  .player {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 99px;
    font-weight: 700; font-size: 1.05rem;
  }
  .p1 { transform: rotate(-0.8deg); }
  .p2 { transform: rotate(0.5deg); }
  .p3 { transform: rotate(-0.3deg); }
  .p4 { transform: rotate(1deg); }
  .p5 { transform: rotate(-0.6deg); }
  .player .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .player .vip {
    font-size: 0.6rem; font-weight: 800; color: var(--gold);
    background: rgba(251,191,36,0.15); padding: 2px 7px; border-radius: 5px;
  }

  /* Settings — scattered as individual tags along the bottom */
  .settings-area {
    position: absolute; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 14px;
  }
  .s-tag {
    padding: 8px 16px; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600;
  }
  .s1 { transform: rotate(-0.5deg); }
  .s2 { transform: rotate(0.3deg); }
  .s3 { transform: rotate(-0.8deg); }
  .s4 { transform: rotate(0.6deg); }
  .s-tag .dim { color: var(--text-dim); }

  .status {
    position: absolute; bottom: 40px; right: 60px;
    font-size: 0.95rem; font-weight: 600; color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="layout-label">D / SCATTERED ATOMS</div>

<div class="lobby">
  <div class="logo">Buzzer<span>Minds</span></div>
  <div class="code-label">Enter Room Code</div>

  <span class="code-ch ch-1">X</span>
  <span class="code-ch ch-2">K</span>
  <span class="code-ch ch-3">7</span>
  <span class="code-ch ch-4">Q</span>
  <span class="code-ch ch-5">M</span>
  <span class="code-ch ch-6">2</span>

  <div class="join-url">at <b>quiz.deadpackets.pw</b></div>

  <div class="qr-area">
    <div class="qr">QR CODE</div>
    <div class="scan-text">Scan to join</div>
  </div>

  <div class="players-area">
    <div class="players-label">Players (5 joined)</div>
    <div class="player-scatter">
      <div class="player atom p1"><span class="dot"></span> SpeedDemon <span class="vip">VIP</span></div>
      <div class="player atom p2"><span class="dot"></span> BrainiacBee</div>
      <div class="player atom p3"><span class="dot"></span> QuizWhiz42</div>
      <div class="player atom p4"><span class="dot"></span> TriviaKing</div>
      <div class="player atom p5"><span class="dot"></span> NerdHerd99</div>
    </div>
  </div>

  <div class="settings-area">
    <div class="s-tag atom s1"><span class="dim">Topic:</span> Science</div>
    <div class="s-tag atom s2"><span class="dim">Diff:</span> Medium</div>
    <div class="s-tag atom s3"><span class="dim">Qs:</span> 10</div>
    <div class="s-tag atom s4"><span class="dim">Time:</span> 30s</div>
  </div>

  <div class="status">Waiting for VIP to start...</div>
</div>

<script>
  const bg = document.getElementById('bg'); const dots = [];
  for (let i = 0; i < 15; i++) {
    const el = document.createElement('div'); el.className = 'bg-dot';
    const size = 80 + Math.random() * 200;
    el.style.width = size + 'px'; el.style.height = size + 'px'; el.style.background = '#7c6ef6';
    bg.appendChild(el);
    dots.push({ el, size, x: Math.random() * innerWidth, y: Math.random() * innerHeight, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3 });
  }
  (function anim() {
    dots.forEach(d => { d.x += d.vx; d.y += d.vy; if (d.x < -d.size) d.x = innerWidth; if (d.x > innerWidth) d.x = -d.size; if (d.y < -d.size) d.y = innerHeight; if (d.y > innerHeight) d.y = -d.size; d.el.style.transform = `translate(${d.x}px,${d.y}px)`; });
    requestAnimationFrame(anim);
  })();
</script>
</body>
</html>
