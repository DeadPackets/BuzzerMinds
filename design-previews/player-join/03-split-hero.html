<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Join — 03 Split Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #141414; --surface: rgba(30,30,30,0.65);
    --amber: #f59e0b; --sage: #4ade80; --rose: #fb7185;
    --sky: #38bdf8; --cream: #fef3c7;
    --text-bright: #f5f5f5; --text-dim: #737373;
    --border: rgba(255,255,255,0.06);
    --font-body: 'DM Sans', sans-serif; --font-display: 'Outfit', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text-bright); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  .theme-label {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    background: rgba(30,30,30,0.7); backdrop-filter: blur(8px);
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(245,158,11,0.12);
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(45deg, rgba(245,158,11,0.03) 0px, rgba(245,158,11,0.03) 1px, transparent 1px, transparent 30px);
  }

  .page {
    position: relative; z-index: 10;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Hero section ── */
  .hero {
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(20,20,20,0.4);
    text-align: center;
    animation: fadeDown 0.5s ease forwards;
  }

  .hero-logo {
    font-family: var(--font-display); font-size: 1.3rem; font-weight: 800;
    margin-bottom: 24px;
  }
  .hero-logo .a { color: var(--amber); }
  .hero-logo .s { color: var(--sage); }

  .hero-code {
    font-family: var(--font-display); font-weight: 900;
    font-size: 3.2rem; letter-spacing: 0.06em;
    color: var(--amber); line-height: 1; margin-bottom: 8px;
  }
  .hero-label {
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-dim);
  }

  .hero-players {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 20px;
    font-size: 0.8rem; color: var(--text-dim);
  }
  .hero-players i { width: 14px; height: 14px; color: var(--sage); }
  .hero-dots {
    display: flex; gap: -4px;
  }
  .hero-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--bg); margin-left: -6px;
  }
  .hero-dot:first-child { margin-left: 0; }

  /* ── Form section ── */
  .form-section {
    flex: 1; padding: 28px 24px max(28px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .section-title {
    font-family: var(--font-display); font-weight: 700; font-size: 1.15rem;
    margin-bottom: 4px;
  }
  .section-subtitle {
    font-size: 0.8rem; color: var(--text-dim); margin-bottom: 24px;
  }

  .field { margin-bottom: 20px; }
  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .field-label i { width: 13px; height: 13px; color: var(--amber); }

  .field-input {
    width: 100%; padding: 14px 16px;
    background: rgba(20,20,20,0.6); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-bright);
    font-size: 1rem; font-weight: 500; outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--sage); }
  .field-input::placeholder { color: var(--text-dim); font-weight: 400; }
  textarea.field-input { resize: none; min-height: 72px; line-height: 1.5; }

  /* ── Color strip ── */
  .color-strip {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .color-strip::-webkit-scrollbar { display: none; }
  .swatch {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid transparent; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: var(--text-bright); transform: scale(1.15); }

  .char-count { text-align: right; font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; }

  /* ── Submit ── */
  .submit-btn {
    width: 100%; padding: 16px; margin-top: auto;
    background: var(--amber); color: var(--bg); border: none; border-radius: 12px;
    font-family: var(--font-display); font-weight: 700; font-size: 1.05rem;
    cursor: pointer; transition: filter 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn i { width: 18px; height: 18px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="theme-label">03 — Split Hero</div>
<div class="bg-pattern"></div>

<div class="page">
  <div class="hero">
    <div class="hero-logo"><span class="a">Buzzer</span><span class="s">Minds</span></div>
    <div class="hero-code">X7KQ9W</div>
    <div class="hero-label">Room Code</div>
    <div class="hero-players">
      <i data-lucide="users"></i>
      <div class="hero-dots">
        <div class="hero-dot" style="background: var(--amber);"></div>
        <div class="hero-dot" style="background: var(--sage);"></div>
        <div class="hero-dot" style="background: var(--rose);"></div>
      </div>
      <span>3 players waiting</span>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">Join the game</div>
    <div class="section-subtitle">Set up your player profile below.</div>

    <div class="field">
      <label class="field-label"><i data-lucide="user"></i> Name</label>
      <input type="text" class="field-input" placeholder="Your display name" maxlength="40">
    </div>

    <div class="field">
      <label class="field-label"><i data-lucide="palette"></i> Color</label>
      <div class="color-strip">
        <div class="swatch active" style="background:#22d3ee;"></div>
        <div class="swatch" style="background:#f59e0b;"></div>
        <div class="swatch" style="background:#4ade80;"></div>
        <div class="swatch" style="background:#fb7185;"></div>
        <div class="swatch" style="background:#a78bfa;"></div>
        <div class="swatch" style="background:#f472b6;"></div>
        <div class="swatch" style="background:#fbbf24;"></div>
        <div class="swatch" style="background:#34d399;"></div>
        <div class="swatch" style="background:#818cf8;"></div>
        <div class="swatch" style="background:#f97316;"></div>
      </div>
    </div>

    <div class="field">
      <label class="field-label"><i data-lucide="brain"></i> Expertise</label>
      <textarea class="field-input" placeholder="Movies, cooking, science..." maxlength="250"></textarea>
      <div class="char-count">0 / 250</div>
    </div>

    <button class="submit-btn"><i data-lucide="zap"></i> Enter Room</button>
  </div>
</div>

<script>
  lucide.createIcons();
  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    });
  });
</script>
</body>
</html>
