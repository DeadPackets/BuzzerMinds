<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Join — 06 Arcade Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #141414; --surface: rgba(30,30,30,0.65);
    --amber: #f59e0b; --sage: #4ade80; --rose: #fb7185;
    --sky: #38bdf8; --cream: #fef3c7;
    --text-bright: #f5f5f5; --text-dim: #737373;
    --border: rgba(255,255,255,0.06);
    --font-body: 'DM Sans', sans-serif; --font-display: 'Outfit', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text-bright); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

  .theme-label {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    background: rgba(30,30,30,0.7); backdrop-filter: blur(8px);
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(245,158,11,0.12);
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(45deg, rgba(245,158,11,0.03) 0px, rgba(245,158,11,0.03) 1px, transparent 1px, transparent 30px);
  }

  .page {
    position: relative; z-index: 10;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
  }

  /* ── Ticket ── */
  .ticket {
    width: 100%; max-width: 380px;
    position: relative;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }

  .ticket-top {
    background: var(--surface); backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    border-bottom: none;
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
  }

  /* Decorative corner marks */
  .ticket-top::before, .ticket-top::after {
    content: '+'; position: absolute; top: 10px;
    font-family: var(--font-display); font-size: 0.7rem;
    color: rgba(245,158,11,0.25); font-weight: 700;
  }
  .ticket-top::before { left: 12px; }
  .ticket-top::after { right: 12px; }

  .ticket-logo {
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 800;
    margin-bottom: 16px;
  }
  .ticket-logo .a { color: var(--amber); }
  .ticket-logo .s { color: var(--sage); }

  .ticket-admit {
    font-family: var(--font-display); font-size: 0.55rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-dim);
    margin-bottom: 4px;
  }
  .ticket-code {
    font-family: var(--font-display); font-weight: 900;
    font-size: 2.8rem; letter-spacing: 0.08em; color: var(--amber);
    line-height: 1;
  }
  .ticket-subtitle {
    margin-top: 8px; font-size: 0.8rem; color: var(--text-dim);
  }

  /* ── Perforated line ── */
  .perforation {
    position: relative; height: 20px;
    display: flex; align-items: center;
  }
  .perforation::before {
    content: ''; position: absolute; left: 0; right: 0;
    border-top: 2px dashed rgba(245,158,11,0.2);
  }
  .perf-circle-left, .perf-circle-right {
    position: absolute; width: 20px; height: 20px;
    background: var(--bg); border-radius: 50%;
  }
  .perf-circle-left { left: -10px; }
  .perf-circle-right { right: -10px; }

  /* ── Ticket bottom (form) ── */
  .ticket-bottom {
    background: var(--surface); backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 0 0 16px 16px;
    border-top: none;
    padding: 24px;
  }

  .field { margin-bottom: 18px; }
  .field:last-of-type { margin-bottom: 24px; }

  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .field-label i { width: 13px; height: 13px; color: var(--amber); }

  .field-input {
    width: 100%; padding: 13px 16px;
    background: rgba(20,20,20,0.6); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-bright);
    font-size: 0.95rem; font-weight: 500; outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--sage); }
  .field-input::placeholder { color: var(--text-dim); font-weight: 400; }
  textarea.field-input { resize: none; min-height: 68px; line-height: 1.5; font-family: var(--font-body); }

  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: var(--text-bright); transform: scale(1.15); }

  .char-count { text-align: right; font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; }

  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--amber); color: var(--bg); border: none; border-radius: 10px;
    font-family: var(--font-display); font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: filter 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn i { width: 18px; height: 18px; }

  /* ── Serial number footer ── */
  .ticket-serial {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 16px; margin-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-display); font-size: 0.6rem;
    color: var(--text-dim); letter-spacing: 0.15em;
  }

  @keyframes popIn {
    0% { opacity: 0; transform: translateY(24px) scale(0.95); }
    70% { opacity: 1; transform: translateY(-3px) scale(1.01); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div class="theme-label">06 — Arcade Ticket</div>
<div class="bg-pattern"></div>

<div class="page">
  <div class="ticket">
    <div class="ticket-top">
      <div class="ticket-logo"><span class="a">Buzzer</span><span class="s">Minds</span></div>
      <div class="ticket-admit">Admit One Player</div>
      <div class="ticket-code">X7KQ9W</div>
      <div class="ticket-subtitle">Live trivia starts when the VIP says go</div>
    </div>

    <div class="perforation">
      <div class="perf-circle-left"></div>
      <div class="perf-circle-right"></div>
    </div>

    <div class="ticket-bottom">
      <div class="field">
        <label class="field-label"><i data-lucide="user"></i> Player Name</label>
        <input type="text" class="field-input" placeholder="Your display name" maxlength="40">
      </div>

      <div class="field">
        <label class="field-label"><i data-lucide="palette"></i> Player Color</label>
        <div class="color-swatches">
          <div class="swatch active" style="background:#22d3ee;"></div>
          <div class="swatch" style="background:#f59e0b;"></div>
          <div class="swatch" style="background:#4ade80;"></div>
          <div class="swatch" style="background:#fb7185;"></div>
          <div class="swatch" style="background:#a78bfa;"></div>
          <div class="swatch" style="background:#f472b6;"></div>
          <div class="swatch" style="background:#fbbf24;"></div>
          <div class="swatch" style="background:#34d399;"></div>
        </div>
      </div>

      <div class="field">
        <label class="field-label"><i data-lucide="brain"></i> Your Expertise</label>
        <textarea class="field-input" placeholder="Movies, sports, science..." maxlength="250"></textarea>
        <div class="char-count">0 / 250</div>
      </div>

      <button class="submit-btn"><i data-lucide="ticket"></i> Claim Your Seat</button>

      <div class="ticket-serial">
        <span>NO. 000847</span>
        <span>BUZZERMINDS.PW</span>
      </div>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();
  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    });
  });
</script>
</body>
</html>
