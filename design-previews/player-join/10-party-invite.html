<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Player Join — 10 Party Invite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #141414; --surface: rgba(30,30,30,0.65);
    --amber: #f59e0b; --sage: #4ade80; --rose: #fb7185;
    --sky: #38bdf8; --cream: #fef3c7;
    --text-bright: #f5f5f5; --text-dim: #737373;
    --border: rgba(255,255,255,0.06);
    --font-body: 'DM Sans', sans-serif; --font-display: 'Outfit', sans-serif;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text-bright);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  .theme-label {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    background: rgba(30,30,30,0.7); backdrop-filter: blur(8px);
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(245,158,11,0.12);
  }

  /* ── Background layers ── */
  .bg-pattern {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(45deg, rgba(245,158,11,0.03) 0px, rgba(245,158,11,0.03) 1px, transparent 1px, transparent 30px);
  }
  #three-canvas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* ── Page layout ── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }

  /* ── Invitation card ── */
  .invite-card {
    width: 100%; max-width: 400px;
    position: relative;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }

  /* ── Decorative border frame ── */
  .invite-frame {
    border: 2px solid rgba(245,158,11,0.2);
    border-radius: 20px;
    padding: 3px;
  }
  .invite-inner {
    background: var(--surface); backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 17px;
    overflow: hidden;
  }

  /* ── Top decorative strip ── */
  .invite-strip {
    padding: 12px 16px;
    background: rgba(245,158,11,0.06);
    border-bottom: 1px solid rgba(245,158,11,0.1);
    display: flex; align-items: center; justify-content: space-between;
  }
  .invite-strip-left {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--amber);
  }
  .invite-strip-left i { width: 13px; height: 13px; }
  .invite-strip-right { display: flex; gap: 5px; }
  .strip-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* ── Header ── */
  .invite-header {
    padding: 22px 20px 16px; text-align: center;
  }
  .invite-pre {
    font-family: var(--font-display); font-size: 0.55rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .invite-title {
    font-family: var(--font-display); font-weight: 900; font-size: 1.6rem;
    letter-spacing: -0.02em; line-height: 1.1;
  }
  .invite-title .a { color: var(--amber); }
  .invite-title .s { color: var(--sage); }

  .invite-room {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 6px 14px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.15);
    border-radius: 20px;
  }
  .invite-room-code {
    font-family: var(--font-display); font-weight: 900; font-size: 1.05rem;
    color: var(--amber); letter-spacing: 0.08em;
  }
  .invite-room i { width: 14px; height: 14px; color: var(--amber); }

  .invite-desc {
    margin-top: 10px; font-size: 0.78rem; color: var(--text-dim); line-height: 1.5;
  }

  /* ── Decorative divider ── */
  .ornament {
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px;
  }
  .ornament-line { flex: 1; height: 1px; background: rgba(245,158,11,0.12); }
  .ornament-diamond {
    width: 7px; height: 7px; background: var(--amber);
    transform: rotate(45deg); border-radius: 1px;
  }

  /* ── Form ── */
  .invite-form { padding: 16px 20px 20px; }

  .field { margin-bottom: 16px; }
  .field:last-of-type { margin-bottom: 20px; }

  .field-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px;
  }
  .field-label i { width: 12px; height: 12px; color: var(--amber); }

  .field-input {
    width: 100%; padding: 12px 14px;
    background: rgba(20,20,20,0.5); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-bright);
    font-size: 0.95rem; font-weight: 500; outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field-input:focus { border-color: var(--sage); }
  .field-input::placeholder { color: var(--text-dim); font-weight: 400; }
  textarea.field-input {
    resize: none; min-height: 64px; line-height: 1.5;
    font-family: var(--font-body);
  }

  /* ── Color swatches ── */
  .color-swatches {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .swatch {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: var(--text-bright); transform: scale(1.15); }

  .char-count {
    text-align: right; font-size: 0.65rem; color: var(--text-dim); margin-top: 4px;
  }

  /* ── Submit button ── */
  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--amber); color: var(--bg); border: none; border-radius: 12px;
    font-family: var(--font-display); font-weight: 700; font-size: 1.05rem;
    cursor: pointer; transition: filter 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn:active { filter: brightness(0.95); }
  .submit-btn i { width: 18px; height: 18px; }

  /* ── Bottom strip ── */
  .invite-bottom {
    padding: 11px 20px;
    background: rgba(245,158,11,0.04);
    border-top: 1px solid rgba(245,158,11,0.1);
    text-align: center;
    font-size: 0.68rem; color: var(--text-dim);
  }
  .invite-bottom strong { color: var(--sage); font-weight: 600; }

  /* ── Animations ── */
  @keyframes popIn {
    0% { opacity: 0; transform: translateY(24px) scale(0.95); }
    70% { opacity: 1; transform: translateY(-3px) scale(1.01); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Small-screen tightening (below 380px wide) ── */
  @media (max-width: 380px) {
    .page { padding: 12px; }
    .invite-header { padding: 18px 16px 14px; }
    .invite-title { font-size: 1.4rem; }
    .invite-form { padding: 14px 16px 18px; }
    .invite-strip { padding: 10px 14px; }
    .ornament { padding: 0 16px; }
    .swatch { width: 32px; height: 32px; }
    .color-swatches { gap: 6px; }
    .field-input { padding: 11px 12px; font-size: 0.9rem; }
    .invite-bottom { padding: 10px 16px; }
  }

  /* ── Tall-screen breathing room ── */
  @media (min-height: 750px) {
    .invite-header { padding: 28px 20px 20px; }
    .invite-title { font-size: 1.85rem; }
    .invite-form { padding: 20px 24px 24px; }
    .field { margin-bottom: 18px; }
    .swatch { width: 38px; height: 38px; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="theme-label">10 — Party Invite</div>

<div class="bg-pattern"></div>
<canvas id="three-canvas"></canvas>

<div class="page">
  <div class="invite-card">
    <div class="invite-frame">
      <div class="invite-inner">

        <div class="invite-strip">
          <div class="invite-strip-left"><i data-lucide="sparkles"></i> Live Trivia</div>
          <div class="invite-strip-right">
            <div class="strip-dot" style="background: var(--amber);"></div>
            <div class="strip-dot" style="background: var(--sage);"></div>
            <div class="strip-dot" style="background: var(--rose);"></div>
          </div>
        </div>

        <div class="invite-header">
          <div class="invite-pre">You're Invited To</div>
          <div class="invite-title"><span class="a">Buzzer</span><span class="s">Minds</span></div>
          <div class="invite-room">
            <i data-lucide="hash"></i>
            <span class="invite-room-code">X7KQ9W</span>
          </div>
          <p class="invite-desc">A live trivia game is starting. Fill in your details to claim a seat.</p>
        </div>

        <div class="ornament">
          <div class="ornament-line"></div>
          <div class="ornament-diamond"></div>
          <div class="ornament-line"></div>
        </div>

        <div class="invite-form">
          <div class="field">
            <label class="field-label"><i data-lucide="user"></i> Your Name</label>
            <input type="text" class="field-input" placeholder="Display name" maxlength="40" autocomplete="off">
          </div>

          <div class="field">
            <label class="field-label"><i data-lucide="palette"></i> Pick a Color</label>
            <div class="color-swatches">
              <div class="swatch active" style="background:#22d3ee;"></div>
              <div class="swatch" style="background:#f59e0b;"></div>
              <div class="swatch" style="background:#4ade80;"></div>
              <div class="swatch" style="background:#fb7185;"></div>
              <div class="swatch" style="background:#a78bfa;"></div>
              <div class="swatch" style="background:#f472b6;"></div>
              <div class="swatch" style="background:#fbbf24;"></div>
              <div class="swatch" style="background:#34d399;"></div>
            </div>
          </div>

          <div class="field">
            <label class="field-label"><i data-lucide="brain"></i> Expertise</label>
            <textarea class="field-input" placeholder="What are you good at?" maxlength="250" autocomplete="off"></textarea>
            <div class="char-count"><span id="charNum">0</span> / 250</div>
          </div>

          <button class="submit-btn"><i data-lucide="party-popper"></i> RSVP & Join</button>
        </div>

        <div class="invite-bottom">First player becomes <strong>VIP</strong> and controls the game</div>

      </div>
    </div>
  </div>
</div>

<script>
  // Lucide icons
  lucide.createIcons();

  // Swatch selection
  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    });
  });

  // Char counter
  const ta = document.querySelector('textarea.field-input');
  const charNum = document.getElementById('charNum');
  if (ta && charNum) {
    ta.addEventListener('input', () => { charNum.textContent = ta.value.length; });
  }

  // Three.js wireframe octahedrons
  (function initThree() {
    const canvas = document.getElementById('three-canvas');
    if (!canvas || typeof THREE === 'undefined') return;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 18;

    const colors = [
      new THREE.Color('#f59e0b'),
      new THREE.Color('#4ade80'),
      new THREE.Color('#fb7185'),
    ];

    const shapes = [];
    const count = window.innerWidth < 500 ? 6 : 10;

    for (let i = 0; i < count; i++) {
      const size = 0.6 + Math.random() * 1.8;
      const geometry = new THREE.OctahedronGeometry(size, 0);
      const wireframe = new THREE.WireframeGeometry(geometry);
      const color = colors[i % 3];
      const opacity = 0.10 + Math.random() * 0.06;
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      const mesh = new THREE.LineSegments(wireframe, material);

      mesh.position.set(
        (Math.random() - 0.5) * 30,
        (Math.random() - 0.5) * 18,
        (Math.random() - 0.5) * 12
      );

      const rotSpeed = {
        x: (Math.random() - 0.5) * 0.004,
        y: (Math.random() - 0.5) * 0.006,
        z: (Math.random() - 0.5) * 0.003,
      };
      const driftSpeed = {
        x: (Math.random() - 0.5) * 0.003,
        y: (Math.random() - 0.5) * 0.002,
      };

      shapes.push({ mesh, rotSpeed, driftSpeed });
      scene.add(mesh);
    }

    function animate() {
      requestAnimationFrame(animate);
      shapes.forEach(s => {
        s.mesh.rotation.x += s.rotSpeed.x;
        s.mesh.rotation.y += s.rotSpeed.y;
        s.mesh.rotation.z += s.rotSpeed.z;
        s.mesh.position.x += s.driftSpeed.x;
        s.mesh.position.y += s.driftSpeed.y;
        if (s.mesh.position.x > 18) s.mesh.position.x = -18;
        if (s.mesh.position.x < -18) s.mesh.position.x = 18;
        if (s.mesh.position.y > 12) s.mesh.position.y = -12;
        if (s.mesh.position.y < -12) s.mesh.position.y = 12;
      });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
</script>
</body>
</html>
