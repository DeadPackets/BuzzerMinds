services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buzzerminds}
      POSTGRES_USER: ${POSTGRES_USER:-buzzerminds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buzzerminds}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buzzerminds} -d ${POSTGRES_DB:-buzzerminds}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buzzerminds}:${POSTGRES_PASSWORD:-buzzerminds}@postgres:5432/${POSTGRES_DB:-buzzerminds}
      BUZZERMINDS_CONFIG_PATH: /app/config.yml
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/audio/sfx/buzz-open.mp3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  searxng:
    image: docker.io/searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://localhost/searxng/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-buzzerminds-searxng-secret}
      UWSGI_WORKERS: 1
      UWSGI_THREADS: 4
    volumes:
      - ./ops/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
